{% extends "base.html" %}

{% block title %}
Create project
{% endblock %}

{% block content %}


<h1 class="mt-4">Create Project</h1>

<form tabindex="0" aria-label="Form for creating new projects" method="post">
    {% csrf_token %}

    {% for field in form %}
        <div class="mb-3">
            
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <div class="text-danger small">{{ field.errors }}</div>
            {% endif %}
            
        </div>
    {% endfor %}

    <button aria-label="create new project" type="submit" tabindex="0" class="btn btn-primary">Create Project</button>
</form>

 <style>
    .form-label {
        color: #343a40;
        font-weight: 500;
    }
</style>
{% endblock %}
